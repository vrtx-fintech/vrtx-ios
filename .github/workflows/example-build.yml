name: Build Example App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: example-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-14
    env:
      VRTX_CLIENT_ID: ${{ secrets.VRTX_CLIENT_ID }}
      VRTX_CLIENT_SECRET: ${{ secrets.VRTX_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift package dependencies
        working-directory: Example
        run: |
          xcodebuild \
            -project Example.xcodeproj \
            -scheme Example \
            -resolvePackageDependencies

      - name: Build Example for iOS Simulator
        working-directory: Example
        run: |
          set -o pipefail
          xcodebuild \
            -project Example.xcodeproj \
            -scheme Example \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            VRTX_CLIENT_ID="$VRTX_CLIENT_ID" \
            VRTX_CLIENT_SECRET="$VRTX_CLIENT_SECRET" \
            build
