name: Build Example App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: example-build-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT: Example/Example.xcodeproj
  SCHEME: Example
  # Generic Simulator destination — independent of which concrete iPhone
  # runtime ships on the runner image.
  IOS_SIMULATOR: generic/platform=iOS Simulator

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      # Cache the SPM package store only — NOT .derivedData. Restoring
      # .derivedData from a previous run carries over already-linked
      # binaries from older package versions, and Xcode happily reuses
      # them instead of re-resolving against the new pbxproj/Package.swift.
      # No `restore-keys` so a partial match can't pull in a stale
      # resolution either — better to re-download the xcframework than
      # silently build against the wrong version.
      - name: Restore SPM cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/*.xcodeproj/project.pbxproj', 'Package.swift', '**/Package.resolved') }}

      - name: Build Example for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project "${PROJECT}" \
            -scheme "${SCHEME}" \
            -configuration Debug \
            -destination "${IOS_SIMULATOR}" \
            -derivedDataPath .derivedData \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
