name: Slack Release Notification

# Releases in this repo are published by the internal SDK release pipeline
# via the release bot. This workflow announces them in Slack so the
# notification lives with the repo where the release actually appears,
# matching the announcement format used by the other SDK repos.

on:
  release:
    types: [published]

permissions: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    # Announce stable releases only; prereleases stay quiet.
    if: ${{ !github.event.release.prerelease }}
    steps:
      # Failures are downgraded to warnings so a Slack outage or a missing
      # webhook never marks a published release as failed.
      - name: Notify Slack
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          TAG: ${{ github.event.release.tag_name }}
          NOTES: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL is not set; skipping release announcement."
            exit 0
          fi
          VERSION="${TAG#v}"
          TITLE="iOS SDK ${VERSION} Available"
          if [ -z "${NOTES}" ]; then
            NOTES="See the GitHub release for details."
          fi
          # Slack section blocks reject text over 3000 characters.
          NOTES="${NOTES:0:2900}"
          POD_URL="https://cocoapods.org/pods/VRTX"
          CONTEXT="<${RELEASE_URL}|GitHub release ${TAG}> · <${POD_URL}|CocoaPods VRTX>"
          PAYLOAD=$(jq -n \
            --arg title "${TITLE}" \
            --arg notes "${NOTES}" \
            --arg context "${CONTEXT}" \
            '{
              blocks: [
                {type: "header", text: {type: "plain_text", text: $title}},
                {type: "section", text: {type: "mrkdwn", text: $notes}},
                {type: "context", elements: [{type: "mrkdwn", text: $context}]}
              ]
            }')
          response=$(curl -sS --fail-with-body -X POST \
            -H 'Content-Type: application/json' \
            --data "${PAYLOAD}" "${WEBHOOK}") || {
            echo "::warning::Slack webhook curl failed: ${response}"
            exit 0
          }
          if [ "${response}" != "ok" ]; then
            echo "::warning::Slack webhook responded: ${response}"
          fi
